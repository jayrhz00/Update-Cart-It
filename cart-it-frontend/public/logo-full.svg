<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 300" role="img" aria-labelledby="fullLogoTitle">
  <title id="fullLogoTitle">Cart-It — Save it. Organize it. Get it.</title>
  <defs>
    <linearGradient id="fullPinkYellow" x1="8%" y1="0%" x2="92%" y2="100%">
      <stop offset="0%" stop-color="#fbcfe8"/>
      <stop offset="42%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#facc15"/>
    </linearGradient>
    <linearGradient id="fullPinkYellowDeep" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#db2777"/>
      <stop offset="100%" stop-color="#ca8a04"/>
    </linearGradient>
    <linearGradient id="fullBannerFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f9a8d4"/>
      <stop offset="100%" stop-color="#fde047"/>
    </linearGradient>
  </defs>

  <!-- Soft shadow under cart -->
  <ellipse cx="160" cy="138" rx="56" ry="11" fill="#fbcfe8" opacity="0.55"/>

  <!-- Arc over cart -->
  <path
    d="M 98 56 Q 160 22 222 56"
    fill="none"
    stroke="url(#fullPinkYellowDeep)"
    stroke-width="4"
    stroke-linecap="round"
  />

  <!-- Sparkles -->
  <g fill="url(#fullPinkYellowDeep)">
    <path d="M238 68l2.2 6.8h7.1l-5.7 4.2 2.2 6.8-5.8-4.2-5.8 4.2 2.2-6.8-5.7-4.2h7.1z"/>
    <path d="M258 88l1.6 5h5.2l-4.2 3 1.6 5-4.2-3-4.2 3 1.6-5-4.2-3h5.2z" opacity="0.85"/>
  </g>

  <!-- Shopping cart -->
  <g fill="none" stroke="url(#fullPinkYellowDeep)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 88 64 h 10 l 14 58 h 92 l 16 -70 H 118"/>
    <circle cx="126" cy="138" r="9" fill="url(#fullPinkYellow)" stroke="url(#fullPinkYellowDeep)" stroke-width="4"/>
    <circle cx="206" cy="138" r="9" fill="url(#fullPinkYellow)" stroke="url(#fullPinkYellowDeep)" stroke-width="4"/>
  </g>

  <!-- Bookmark / ribbon in cart -->
  <path
    d="M 148 76 L 148 128 L 160 118 L 172 128 L 172 76 Z"
    fill="url(#fullBannerFill)"
    stroke="url(#fullPinkYellowDeep)"
    stroke-width="2.5"
    stroke-linejoin="round"
  />
  <!-- Heart on bookmark -->
  <path
    d="M 160 108.5 c -4 -5 -11 -4 -11 2.5 c 0 5 11 10 11 10 s 11 -5 11 -10 c 0 -6.5 -7 -7.5 -11 -2.5 z"
    fill="#ffffff"
  />

  <!-- Wordmark -->
  <text
    x="160"
    y="198"
    text-anchor="middle"
    font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="44"
    font-weight="800"
    letter-spacing="-0.03em"
    fill="url(#fullPinkYellow)"
  >Cart-It</text>

  <!-- Divider with heart -->
  <g stroke="url(#fullPinkYellowDeep)" stroke-width="2" stroke-linecap="round">
    <line x1="72" y1="218" x2="148" y2="218"/>
    <line x1="172" y1="218" x2="248" y2="218"/>
  </g>
  <path
    d="M 160 212 c -2.5 -3.2 -6.8 -2.6 -6.8 1.2 c 0 3.2 6.8 6.5 6.8 6.5 s 6.8 -3.3 6.8 -6.5 c 0 -3.8 -4.3 -4.4 -6.8 -1.2 z"
    fill="url(#fullPinkYellow)"
  />

  <!-- Tagline -->
  <text
    x="160"
    y="252"
    text-anchor="middle"
    font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="15"
    font-weight="700"
    letter-spacing="0.12em"
    fill="url(#fullPinkYellowDeep)"
  >SAVE IT. ORGANIZE IT. GET IT.</text>
</svg>
